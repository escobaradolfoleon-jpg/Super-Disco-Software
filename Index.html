<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER DISCO v26.0 - BY COLOMBIA335</title>
    <style>
        body { background-color: #050505; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; text-transform: uppercase; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes strobe { 0% { border-color: #300; box-shadow: 0 0 5px #300; } 50% { border-color: #f00; box-shadow: 0 0 20px #f00; } 100% { border-color: #300; box-shadow: 0 0 5px #300; } }
        
        #main-rack { width: 90%; max-width: 850px; background: #000; border: 4px solid #f00; padding: 25px; box-shadow: 0 0 70px rgba(255,0,0,0.4); text-align: center; border-radius: 12px; margin: 20px; }
        
        #logo-container { margin-bottom: 25px; padding: 15px; background: #080808; border-bottom: 2px solid #300; position: relative; }
        
        .siniestro-symbol { width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 80px solid #f00; margin: 10px auto; position: relative; animation: strobe 2s infinite; }
        .siniestro-symbol::before { content: ''; width: 0; height: 0; border-left: 42px solid transparent; border-right: 42px solid transparent; border-top: 68px solid #000; position: absolute; top: -76px; left: -42px; }
        .siniestro-symbol::after { content: 'C'; color: #f00; font-size: 30px; position: absolute; top: -65px; left: -11px; font-weight: bold; text-shadow: 0 0 10px #f00; }

        h1 { font-size: clamp(24px, 5vw, 40px); margin: 5px 0; letter-spacing: 8px; font-weight: 900; text-shadow: 0 0 25px #ff0000; color: #fff; }
        h2 { font-size: 11px; margin: 0; letter-spacing: 4px; color: #888; }

        .gears-rack { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: #0a0a0a; padding: 15px; border: 2px solid #200; border-radius: 5px; }
        .gear-btn { cursor: pointer; text-align: center; width: 100px; transition: 0.2s; padding: 5px; border: 1px solid #111; }
        .gear-btn:hover { color: #fff; border-color: #f00; background: #111; }
        .g-icon { font-size: 30px; display: block; animation: rotate 6s linear infinite; }
        .g-label { font-size: 9px; font-weight: bold; margin-top: 6px; display: block; color: #888; }

        .disco-center { font-size: 100px; filter: drop-shadow(0 0 25px #ff0000); animation: rotate 15s linear infinite; margin: 20px auto; cursor: pointer; display: block; width: 100px; user-select: none; }

        .display-screen { background: #000; color: #0f0; border: 2px inset #111; padding: 18px; margin: 20px 0; font-size: 11px; text-align: left; min-height: 55px; font-family: 'Consolas', monospace; border-radius: 5px; }

        /* NUEVA SECCIÓN DE LINKS */
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 10px; padding: 10px; background: #080808; border: 1px solid #222; border-radius: 4px; }
        .social-links a { color: #ff0000; text-decoration: none; font-size: 10px; font-weight: bold; letter-spacing: 2px; transition: 0.3s; }
        .social-links a:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        .btn-rec { background: #ff0000; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; border-radius: 6px; font-size: 14px; letter-spacing: 2px; }

        .piano-roll { display: flex; justify-content: center; background: #080808; padding: 25px 10px; border-radius: 8px; border: 2px solid #333; position: relative; gap: 2px; overflow-x: auto; }
        .key-w { min-width: 45px; height: 150px; background: #eee; border: 1px solid #000; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; color: #000; font-size: 10px; font-weight: bold; z-index: 1; border-radius: 0 0 6px 6px; }
        .key-w:active { background: #ff0000; color: #fff; transform: translateY(4px); }
        .key-b { min-width: 28px; height: 90px; background: #000; border: 1px solid #444; cursor: pointer; margin-left: -14px; margin-right: -14px; z-index: 2; border-radius: 0 0 4px 4px; }
    </style>
</head>
<body>

    <div id="main-rack">
        <div id="logo-container">
            <div class="siniestro-symbol"></div>
            <h1>SUPER DISCO</h1>
            <h2>COLOMBIA335 / HARDSTEP MASTER</h2>
        </div>

        <div class="gears-rack">
            <div class="gear-btn" onclick="setFX(1.2, 'LFO')"><span class="g-icon">⚙️</span><span class="g-label">LFO</span></div>
            <div class="gear-btn" onclick="setFX(0.5, 'CRUSHER')"><span class="g-icon">⚙️</span><span class="g-label">CRUSHER</span></div>
            <div class="gear-btn" onclick="setFX(1.0, 'DISTANT', 0.4)"><span class="g-icon">⚙️</span><span class="g-label">DISTANT</span></div>
            <div class="gear-btn" onclick="setFX(1.7, 'VOICE')"><span class="g-icon">⚙️</span><span class="g-label">VOICE</span></div>
            <div class="gear-btn" onclick="doScratch()"><span class="g-icon">⚙️</span><span class="g-label">SCRATCH</span></div>
            <div class="gear-btn" onclick="setFX(1.0, 'RE-MASTER', 1.0, 3)"><span class="g-icon">⚙️</span><span class="g-label">RE-MASTER</span></div>
        </div>

        <div class="disco-center" onclick="playS(0)">💿</div>

        <button id="btnR" class="btn-rec" onclick="startR()">🔴 GRABAR MASTER WAV</button>
        <button id="btnS" class="btn-rec" style="display:none; background:white; color:red;" onclick="stopR()">⏹️ GUARDAR Y DESCARGAR</button>

        <div class="display-screen" id="scr"> > ENGINE: ONLINE <br> > BY COLOMBIA335 <br> > STATUS: READY TO DESTROY </div>

        <div class="social-links">
            <a href="https://www.youtube.com/@Bogota424GD" target="_blank">[ YOUTUBE ]</a>
            <a href="https://colombia335.newgrounds.com/" target="_blank">[ NEWGROUNDS ]</a>
            <a href="https://www.reddit.com/user/ParsnipPlayful2929/" target="_blank">[ REDDIT ]</a>
        </div>

        <br>

        <div class="piano-roll">
            <div class="key-w" onclick="playS(0)">C0</div>
            <div class="key-b" onclick="playS(2.5)"></div>
            <div class="key-w" onclick="playS(5)">D</div>
            <div class="key-b" onclick="playS(7.5)"></div>
            <div class="key-w" onclick="playS(10)">E</div>
            <div class="key-w" onclick="playS(12.5)">F</div>
            <div class="key-b" onclick="playS(15)"></div>
            <div class="key-w" onclick="playS(17.5)">G</div>
            <div class="key-b" onclick="playS(20)"></div>
            <div class="key-w" onclick="playS(22.5)">A</div>
            <div class="key-b" onclick="playS(25)"></div>
            <div class="key-w" onclick="playS(27.5)">B</div>
            <div class="key-w" onclick="playS(30)">C10</div>
        </div>
    </div>

    <script>
        var sampler = new Audio('normal sound.wav.wav');
        var recorder, chunks = [];

        function playS(t) {
            sampler.currentTime = t;
            sampler.play().catch(e => {
                document.getElementById('scr').innerHTML = "> SYSTEM: AUDIO LOCKED <br> > CLIC DISCO TO UNLOCK";
            });
            document.getElementById('scr').innerHTML = "> PLAYING SLICE: " + t + "s <br> > COLOMBIA335 MASTER ENGINE";
        }

        function setFX(s, n, v=1, b=1) {
            sampler.playbackRate = s;
            sampler.volume = v;
            document.getElementById('scr').innerHTML = "> FX ACTIVE: " + n;
            document.getElementById('main-rack').style.boxShadow = "0 0 70px rgba(255,0,0," + (0.4 * b) + ")";
        }

        function doScratch() {
            sampler.playbackRate = 4.0;
            setTimeout(() => sampler.playbackRate = 0.5, 120);
            setTimeout(() => sampler.playbackRate = 1.0, 280);
        }

        function startR() {
            chunks = [];
            const stream = sampler.captureStream ? sampler.captureStream() : sampler.mozCaptureStream();
            if (!stream) return alert("Navegador no soporta captura.");
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'Colombia335_Session.wav'; a.click();
            };
            recorder.start();
            document.getElementById('btnR').style.display='none';
            document.getElementById('btnS').style.display='block';
        }

        function stopR() {
            recorder.stop();
            document.getElementById('btnR').style.display='block';
            document.getElementById('btnS').style.display='none';
        }
    </script>
</body>
</html>
