<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER DISCO v27.0 - HARDSTEP SAMPLER</title>
    <style>
        body { background-color: #050505; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; text-transform: uppercase; overflow: hidden; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes strobe { 0% { border-color: #300; } 50% { border-color: #f00; } 100% { border-color: #300; } }
        #main-rack { width: 90%; max-width: 850px; background: #000; border: 4px solid #f00; padding: 25px; box-shadow: 0 0 70px rgba(255,0,0,0.5); text-align: center; border-radius: 12px; }
        #logo-container { margin-bottom: 20px; padding: 10px; background: #080808; border-bottom: 2px solid #300; }
        .siniestro-symbol { width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 80px solid #f00; margin: 10px auto; position: relative; animation: strobe 2s infinite; }
        .siniestro-symbol::after { content: 'C'; color: #f00; font-size: 30px; position: absolute; top: -65px; left: -11px; font-weight: bold; }
        h1 { font-size: 35px; margin: 5px 0; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px #f00; }
        .gears-rack { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .gear-btn { cursor: pointer; text-align: center; width: 90px; border: 1px solid #222; padding: 5px; }
        .g-icon { font-size: 25px; display: block; animation: rotate 8s linear infinite; }
        .g-label { font-size: 8px; color: #888; }
        .disco-center { font-size: 90px; animation: rotate 12s linear infinite; margin: 15px auto; cursor: pointer; display: block; width: 90px; filter: drop-shadow(0 0 15px #f00); }
        .display-screen { background: #000; color: #0f0; border: 2px inset #111; padding: 15px; margin: 15px 0; font-size: 11px; text-align: left; min-height: 45px; }
        .social-links { margin: 10px 0; font-size: 9px; }
        .social-links a { color: #f00; text-decoration: none; margin: 0 10px; border: 1px solid #300; padding: 3px 6px; }
        .social-links a:hover { color: #fff; background: #300; }
        .piano-roll { display: flex; justify-content: center; background: #080808; padding: 20px 5px; border-radius: 8px; border: 2px solid #333; gap: 2px; }
        .key-w { min-width: 50px; height: 140px; background: #eee; border: 1px solid #000; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; color: #000; font-size: 9px; font-weight: bold; border-radius: 0 0 5px 5px; }
        .key-w:active { background: #f00; color: #fff; }
        .key-b { min-width: 30px; height: 85px; background: #000; border: 1px solid #444; cursor: pointer; margin-left: -15px; margin-right: -15px; z-index: 2; border-radius: 0 0 3px 3px; }
        .btn-rec { background: #f00; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="main-rack">
        <div id="logo-container">
            <div class="siniestro-symbol"></div>
            <h1>SUPER DISCO</h1>
            <h2>COLOMBIA335 / BOGOTA424</h2>
        </div>

        <div class="gears-rack">
            <div class="gear-btn" onclick="setFX(0.7, 'SLOW')"><span class="g-icon">⚙️</span><span class="g-label">SLOW</span></div>
            <div class="gear-btn" onclick="setFX(1.5, 'FAST')"><span class="g-icon">⚙️</span><span class="g-label">FAST</span></div>
            <div class="gear-btn" onclick="doScratch()"><span class="g-icon">⚙️</span><span class="g-label">SCRATCH</span></div>
        </div>

        <div class="disco-center" onclick="playS(10)">💿</div>

        <button id="btnR" class="btn-rec" onclick="startR()">🔴 RECORD SESSION (WAV)</button>
        <button id="btnS" class="btn-rec" style="display:none; background:#fff; color:#f00;" onclick="stopR()">⏹️ SAVE DOWNLOAD</button>

        <div class="display-screen" id="scr"> > ENGINE: READY <br> > AUDIO LENGTH: 4:04 <br> > PRESS KEYS TO SAMPLE </div>

        <div class="social-links">
            <a href="https://www.youtube.com/@Bogota424GD" target="_blank">YOUTUBE</a>
            <a href="https://colombia335.newgrounds.com/" target="_blank">NEWGROUNDS</a>
            <a href="https://www.reddit.com/user/ParsnipPlayful2929/" target="_blank">REDDIT</a>
        </div>

        <div class="piano-roll">
            <div class="key-w" onclick="playS(5)">C0</div>
            <div class="key-b" onclick="playS(25)"></div>
            <div class="key-w" onclick="playS(45)">D</div>
            <div class="key-b" onclick="playS(70)"></div>
            <div class="key-w" onclick="playS(100)">E</div>
            <div class="key-w" onclick="playS(130)">F</div>
            <div class="key-b" onclick="playS(160)"></div>
            <div class="key-w" onclick="playS(185)">G</div>
            <div class="key-b" onclick="playS(210)"></div>
            <div class="key-w" onclick="playS(230)">A</div>
            <div class="key-b" onclick="playS(235)"></div>
            <div class="key-w" onclick="playS(240)">B</div>
            <div class="key-w" onclick="playS(243)">C10</div>
        </div>
    </div>

    <script>
        var sampler = new Audio('normal sound.wav.wav');
        var recorder, chunks = [];

        function playS(t) {
            sampler.currentTime = t;
            sampler.play().catch(e => {
                document.getElementById('scr').innerHTML = "> SYSTEM: INTERACTION NEEDED <br> > CLICK THE DISK TO START";
            });
            document.getElementById('scr').innerHTML = "> SAMPLING AT: " + Math.floor(t/60) + ":" + (t%60).toString().padStart(2, '0') + "<br> > MODE: 4:04 MASTER";
        }

        function setFX(s, n) {
            sampler.playbackRate = s;
            document.getElementById('scr').innerHTML = "> FX: " + n;
        }

        function doScratch() {
            sampler.playbackRate = 4.0;
            setTimeout(() => sampler.playbackRate = 0.5, 150);
            setTimeout(() => sampler.playbackRate = 1.0, 300);
        }

        function startR() {
            chunks = [];
            const stream = sampler.captureStream ? sampler.captureStream() : sampler.mozCaptureStream();
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'Hardstep_Session.wav'; a.click();
            };
            recorder.start();
            document.getElementById('btnR').style.display='none';
            document.getElementById('btnS').style.display='block';
        }

        function stopR() {
            recorder.stop();
            document.getElementById('btnR').style.display='block';
            document.getElementById('btnS').style.display='none';
        }
    </script>
</body>
</html>
